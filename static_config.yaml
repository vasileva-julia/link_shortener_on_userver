components_manager:

  components:

    server:
      listener:
        port: 8082
        task_processor: main-task-processor

    logging:
      loggers:
        default:
          file_path: '@stderr'
          level: debug
          overflow_behavior: discard

    handler-link-maker:
        path: /v1/create
        task_processor: main-task-processor
        method: GET,POST

    handler-redirect-to-long:
      path: /v1/link/{id}
      task_processor: main-task-processor
      method: GET,POST

    recent-links-cache:
      update-types: full-and-incremental
      full-update-interval: 1h
      update-interval: 5s

    postgres-db-1:
      dbconnection: "postgresql://test_user:password@localhost:5432/mydb"
      blocking_task_processor: fs-task-processor

    testsuite-support:

    dns-client:
            fs-task-processor: fs-task-processor

    dynamic-config:
      defaults:
        POSTGRES_CONNECTION_POOL_SETTINGS:
          postgres-db-1:
            max_pool_size: 15
            max_queue_size: 200
            min_pool_size: 8
        POSTGRES_HANDLERS_COMMAND_CONTROL:
          /v1/link:
            GET:
              network_timeout_ms: 500
              statement_timeout_ms: 250
        POSTGRES_QUERIES_COMMAND_CONTROL:
          sample_select_value:
            network_timeout_ms: 70
            statement_timeout_ms: 40
          sample_transaction_insert_key_value:
            network_timeout_ms: 200
            statement_timeout_ms: 150
        POSTGRES_STATEMENT_METRICS_SETTINGS:
          postgres-db-1:
              max_statement_metrics: 5

  task_processors:

    main-task-processor:
      worker_threads: 4

    fs-task-processor:
      worker_threads: 4

  default_task_processor: main-task-processor
